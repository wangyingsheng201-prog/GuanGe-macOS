      - name: 提交完整源码
        run: |
          git config user.name "xingheyaoshi"
          git config user.email "xingheyaoshi@163.com"
          git add -A
          git commit -m "feat: 导入观格 macOS 1.0.0 完整源码"
          git push origin HEAD:main

      - name: 构建 Universal 应用
        run: bash scripts/build-app.sh

      - name: 校验 Universal 架构
        run: lipo -info ".build-universal/观格-macOS-1.0.0/观格.app/Contents/MacOS/GuanGe"

      - name: 上传可运行程序
        uses: actions/upload-artifact@v4
        with:
          name: GuanGe-macOS-Universal-1.0.0
          path: dist/GuanGe-macOS-Universal-1.0.0.zip
          if-no-files-found: error
          retention-days: 30
