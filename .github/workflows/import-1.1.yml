name: 导入观格 1.1.0 源码

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/import-1.1.yml"

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 导入源码
        shell: bash
        run: |
          printf '%s' '' | base64 --decode > /tmp/guange-source.zip
          python3 - <<'PY'
          import zipfile
          with zipfile.ZipFile("/tmp/guange-source.zip") as archive:
              archive.extractall(".")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md Resources/Info.plist Sources scripts macOS-操作使用说明.txt macOS-版本更新日志.txt
          if ! git diff --cached --quiet; then
            git commit -m "feat: 导入观格 macOS 1.1.0 源码"
            git push
          fi
