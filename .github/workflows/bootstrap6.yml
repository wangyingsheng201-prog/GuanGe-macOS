name: 观格 macOS 完整源码导入

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/bootstrap6.yml'

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore and publish complete Unicode source tree
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/guange-source.b64" <<'GUANGE_SOURCE'
          
          GUANGE_SOURCE
          base64 --decode "$RUNNER_TEMP/guange-source.b64" > "$RUNNER_TEMP/guange-source.zip"
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          python3 -c 'import sys, zipfile; zipfile.ZipFile(sys.argv[1]).extractall(".")' "$RUNNER_TEMP/guange-source.zip"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: 导入观格 macOS 1.0.0 完整源码"
          git push origin HEAD:main
